server:
  port: 8080

spring:
  application:
    name: mboa-ops-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mboaops}
    username: ${DB_USER:mboaops}
    password: ${DB_PASSWORD:mboaops}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# Circuits : 3 échecs consécutifs -> OPEN pendant 60s, puis 1 appel d'essai
# en half-open. FORCED_OPEN est réservé au kill switch /api/chaos.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 3
        minimum-number-of-calls: 3
        failure-rate-threshold: 100
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 1
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      qwen:
        base-config: default
      whatsapp:
        base-config: default
      sms:
        base-config: default
      stock:
        base-config: default

mboa-ops:
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: ${QWEN_BASE_URL:https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
    model-fast: ${QWEN_MODEL_FAST:qwen3.6-flash}
    model-reasoning: ${QWEN_MODEL_REASONING:qwen3.7-max}
    model-vl: ${QWEN_MODEL_VL:qwen3-vl-flash}
    model-asr: ${QWEN_MODEL_ASR:qwen3-asr-flash}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.mboaops: INFO
